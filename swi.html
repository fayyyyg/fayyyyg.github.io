<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>System</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.text {
  font-size: 13px;
  text-align: center;
  margin-bottom: 40px;
  letter-spacing: 0.5px;
}

.cn {
  font-family: "STFangsong", "FangSong", serif;
}

.en {
  font-family: "Courier New", monospace;
  opacity: 0.9;
}

button {
  padding: 10px 20px;
  font-size: 12px;
  font-family: "Courier New", monospace;
  cursor: pointer;
  background: transparent;
  color: white;
  border: 1px solid white;
  transition: all 0.3s;
}

button:hover {
  background: white;
  color: black;
}

#imageContainer {
  margin-top: 40px;
  opacity: 0;
  transition: opacity 4s;
  display: flex;
  justify-content: center;
}

img {
  max-width: 80vw;
  max-height: 70vh;
}

#saveBtn {
  display: none;
  margin-top: 20px;
}

#loading {
  display: none;
  font-size: 13px;
  font-family: "Courier New", monospace;
  margin-top: 20px;
  animation: breathe 1.5s infinite;
  opacity: 0.7;
}

@keyframes breathe {
  0% { opacity: 0.2; }
  50% { opacity: 1; }
  100% { opacity: 0.2; }
}

#sideText {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 260px;
  font-size: 10px;
  line-height: 1.6;
  opacity: 0.5;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="text" id="topText">
  <div class="cn">生成高逸菲风格的图片</div>
  <div class="en">Generate in yifeigao's style</div>
</div>

<button id="btn">Generate</button>

<div id="loading">Generating...</div>

<div id="imageContainer">
  <img id="result" src="">
</div>

<button id="saveBtn">Save Image</button>

<div id="sideText"></div>

<audio id="audio" src="sound.mp3"></audio>

<script>

// ===== 图片列表 =====
const images = [];
for (let i = 1; i <= 3; i++) {
  images.push(`swi_images/gen_${i}.jpeg`);
}

// ===== 记忆进度 =====
let currentIndex = localStorage.getItem("swi_index");
currentIndex = currentIndex === null ? 0 : parseInt(currentIndex);

let isGenerating = false;

// ===== 文字 =====
const lines = [
  { cn: "感谢诗人三聋子", en: "Thanks to the poet San Longzi" },
  { cn: "让我用他的诗《无归即归记》作为加载音效。", en: "for allowing me to use his poem as loading audio." },
  { cn: "请不要不停点击", en: "Please do not repeatedly click this system." },
];

const sideText = document.getElementById("sideText");

function typeLines(index = 0) {
  if (index >= lines.length) return;

  const cnLine = document.createElement("div");
  cnLine.className = "cn";
  cnLine.textContent = lines[index].cn;
  sideText.appendChild(cnLine);

  const enLine = document.createElement("div");
  enLine.className = "en";
  enLine.textContent = lines[index].en;
  sideText.appendChild(enLine);

  setTimeout(() => typeLines(index + 1), 900);
}

// ===== DOM =====
const btn = document.getElementById("btn");
const img = document.getElementById("result");
const imgContainer = document.getElementById("imageContainer");
const loading = document.getElementById("loading");
const saveBtn = document.getElementById("saveBtn");
const audio = document.getElementById("audio");
const topText = document.getElementById("topText");

// ===== 点击 =====
btn.onclick = () => {

  if (isGenerating) return;

  // 👉 已耗尽
  if (currentIndex >= images.length) {
    document.body.innerHTML = `
      <div style="
        background:black;
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        font-family:Courier New, monospace;
        text-align:center;
      ">
        <div style="color:red;font-size:32px;margin-bottom:20px;">
          OUT OF TOKEN
        </div>
        <div style="color:red;font-size:14px;opacity:0.8;">
          I told you not to keep clicking.
        </div>
      </div>
    `;
    return;
  }

  isGenerating = true;

  btn.style.display = "none";
  topText.style.display = "none";
  loading.style.display = "block";
  imgContainer.style.opacity = 0;
  saveBtn.style.display = "none";

  audio.play();

  setTimeout(() => {

    // 👉 再检查一次（防止最后一张之后卡住）
    if (currentIndex >= images.length) {
      document.body.innerHTML = `
        <div style="
          background:black;
          height:100vh;
          display:flex;
          flex-direction:column;
          justify-content:center;
          align-items:center;
          font-family:Courier New, monospace;
          text-align:center;
        ">
          <div style="color:red;font-size:32px;margin-bottom:20px;">
            OUT OF TOKEN
          </div>
          <div style="color:red;font-size:14px;opacity:0.8;">
            I told you not to keep clicking.
          </div>
        </div>
      `;
      return;
    }

    img.src = images[currentIndex];

    img.onload = () => {
      loading.style.display = "none";
      imgContainer.style.opacity = 1;
      saveBtn.style.display = "block";

      if (sideText.innerHTML.trim() === "") {
        typeLines();
      }
    };

    currentIndex++;
    localStorage.setItem("swi_index", currentIndex);

    isGenerating = false;

  }, 20000);
};

// ===== 保存 =====
saveBtn.onclick = () => {
  const link = document.createElement("a");
  link.href = img.src;
  link.download = "yifeigao_image.jpg";
  link.click();
};

</script>

</body>
</html>
